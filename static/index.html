<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrazione Dati Taglio - GTECH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 14px;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .files-list {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .file-item-name {
            color: #333;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.3s ease;
        }

        .file-item-remove:hover {
            background: #ee5a52;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .message.info {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }

        .info-box {
            background: #f0f2ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }

        .info-box strong {
            color: #333;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Estrazione Dati Taglio</h1>
        <p class="subtitle">GTECH Costificazione</p>

        <div class="info-box">
            <strong>Come funziona:</strong><br>
            Carica uno o più PDF con le liste di taglio. Il sistema estrarrà automaticamente i dati e genererà un file Excel pronto per l'uso.
        </div>

        <div id="message"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Trascina i PDF qui</div>
            <div class="upload-subtext">o clicca per selezionare</div>
            <label class="file-input-label">
                Seleziona File
                <input type="file" id="fileInput" multiple accept=".pdf">
            </label>
        </div>

        <div id="filesList" class="files-list" style="display: none;"></div>

        <div class="button-group">
            <button class="btn-primary" id="processBtn" disabled>
                🚀 Estrai e Scarica Excel
            </button>
            <button class="btn-secondary" id="clearBtn">
                🗑️ Cancella
            </button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Estrazione in corso...</div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const processBtn = document.getElementById('processBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const messageEl = document.getElementById('message');
        const selectedFiles = new Set();

        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.type === 'application/pdf') {
                    selectedFiles.add(file);
                } else {
                    showMessage(`"${file.name}" non è un PDF valido`, 'error');
                }
            }
            updateFilesList();
        }

        function updateFilesList() {
            if (selectedFiles.size === 0) {
                filesList.style.display = 'none';
                processBtn.disabled = true;
            } else {
                filesList.style.display = 'block';
                filesList.innerHTML = '';
                selectedFiles.forEach((file) => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerHTML = `
                        <div class="file-item-name">${file.name}</div>
                        <button class="file-item-remove" onclick="removeFile('${file.name}')">Rimuovi</button>
                    `;
                    filesList.appendChild(div);
                });
                processBtn.disabled = false;
            }
        }

        function removeFile(fileName) {
            for (let file of selectedFiles) {
                if (file.name === fileName) {
                    selectedFiles.delete(file);
                    break;
                }
            }
            updateFilesList();
        }

        processBtn.addEventListener('click', async () => {
            if (selectedFiles.size === 0) {
                showMessage('Seleziona almeno un PDF', 'error');
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach((file) => {
                formData.append('files', file);
            });

            loading.style.display = 'block';
            processBtn.disabled = true;

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'taglio_estratto.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    showMessage(`✓ Excel generato con successo! ${selectedFiles.size} file elaborati.`, 'success');
                    selectedFiles.clear();
                    updateFilesList();
                } else {
                    const error = await response.json();
                    showMessage(`Errore: ${error.error}`, 'error');
                }
            } catch (error) {
                showMessage(`Errore di connessione: ${error.message}`, 'error');
            } finally {
                loading.style.display = 'none';
                processBtn.disabled = false;
            }
        });

        clearBtn.addEventListener('click', () => {
            selectedFiles.clear();
            fileInput.value = '';
            updateFilesList();
            messageEl.style.display = 'none';
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 4000);
            }
        }
    </script>
</body>
</html>
